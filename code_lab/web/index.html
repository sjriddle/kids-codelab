<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🧪 Code Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Quicksand:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <script>try{if(JSON.parse(localStorage.getItem("codelab:dark")))document.body.classList.add("dark");}catch(e){}</script>
  <!-- Compact top bar: title + which lesson -->
  <header class="topbar">
    <h1>🧪 Code Lab</h1>
    <div class="lesson-controls">
      <select id="lessons" title="Choose a lesson"></select>
      <button id="next" class="btn small" title="Next lesson">Next ▶</button>
      <div class="options">
        <button id="optionsBtn" class="btn small" aria-haspopup="true" aria-expanded="false">⚙️ Options</button>
        <div id="optionsPanel" class="options-panel" hidden>
          <label class="opt"><input type="checkbox" id="dark"> 🌗 Dark mode</label>
          <label class="opt"><input type="checkbox" id="calm"> 🌙 Calm mode <span class="opt-hint">(fewer animations & sounds)</span></label>
          <label class="opt"><input type="checkbox" id="autorun" checked> ▶ Run when I move a knob</label>
          <hr>
          <div class="opt-row">
            <span id="stars" title="Lessons you've finished">⭐ 0/0</span>
            <button id="resetStars" class="btn small" title="Clear your stars">Reset</button>
          </div>
          <hr>
          <button id="save" class="btn small" title="Save your picture as an image file">💾 Save picture</button>
        </div>
      </div>
    </div>
  </header>

  <!-- The mission, read first. 🔊 reads it aloud; turns GREEN on success. -->
  <div class="goal-row">
    <button id="speak" class="icon-btn" title="Read the goal out loud" aria-label="Read the goal out loud">🔊</button>
    <div id="goal" class="goal">&nbsp;</div>
  </div>

  <div class="lab">
    <!-- LEFT: the controls (knobs first — the youngest child's main tool) -->
    <section class="left">
      <div class="panel knobs-panel">
        <div class="panel-title">🎛️ Knobs <span class="tiny">(change the variables)</span></div>
        <div id="knobs" class="knobs"></div>
      </div>

      <div id="palette" class="palette"></div>

      <label class="codelabel" for="code">📝 Your code</label>
      <div class="editor">
        <div class="gutter" id="gutter" aria-hidden="true"></div>
        <div class="code-wrap">
          <pre id="code-highlight" aria-hidden="true"></pre>
          <textarea id="code" wrap="off" spellcheck="false" autocomplete="off"></textarea>
        </div>
      </div>

      <div class="row run-row">
        <button id="run" class="btn run">▶ Run</button>
        <button id="reset" class="btn reset" title="Restore this lesson's starting code">↺ Reset</button>
      </div>

      <details id="tip" class="tip"><summary>💡 Grown-up tip</summary><div id="tip-body"></div></details>
    </section>

    <!-- RIGHT: the output — the star of the show -->
    <section class="right">
      <canvas id="stage" width="760" height="580" tabindex="0"></canvas>
      <div id="dpad" class="dpad" hidden>
        <button data-key="up" aria-label="up">⬆️</button>
        <div class="dpad-mid">
          <button data-key="left" aria-label="left">⬅️</button>
          <button data-key="down" aria-label="down">⬇️</button>
          <button data-key="right" aria-label="right">➡️</button>
        </div>
      </div>
      <div id="status">&nbsp;</div>
      <div class="progress" id="progress"><div id="progress-bar"></div></div>
      <pre id="console"></pre>
    </section>
  </div>

  <script src="lab.js"></script>
</body>
</html>
